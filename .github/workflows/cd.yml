name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-contracts:
    name: Deploy Soroban Contracts
    runs-on: ubuntu-latest
    env:
      SOROBAN_RPC_URL: ${{ secrets.SOROBAN_RPC_URL }}
      SOROBAN_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build contracts
        working-directory: contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli
      - name: Deploy Token Contract
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/token_contract.wasm \
            --source $SOROBAN_SECRET_KEY \
            --rpc-url $SOROBAN_RPC_URL \
            --network-passphrase "$SOROBAN_NETWORK_PASSPHRASE"

      - name: Deploy Split Contract
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/split_contract.wasm \
            --source $SOROBAN_SECRET_KEY \
            --rpc-url $SOROBAN_RPC_URL \
            --network-passphrase "$SOROBAN_NETWORK_PASSPHRASE"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-contracts]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend