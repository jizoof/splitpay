name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-contracts:
  name: Build Soroban Contracts
  runs-on: ubuntu-latest

  steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Build contracts
      working-directory: contracts
      run: cargo build --release --target wasm32-unknown-unknown

    - steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build contracts
        working-directory: contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Install Soroban CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/stellar/soroban-cli/releases/download/v25.2.0/soroban-cli-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf soroban-cli-x86_64-unknown-linux-gnu.tar.gz
          chmod +x soroban
          sudo mv soroban /usr/local/bin/

      - name: Deploy Split Contract
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/split_contract.wasm \
            --source $SOROBAN_SECRET_KEY \
            --rpc-url $SOROBAN_RPC_URL \
            --network-passphrase "$SOROBAN_NETWORK_PASSPHRASE"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-contracts]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend